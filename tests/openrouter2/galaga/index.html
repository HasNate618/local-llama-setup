<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaga Clone</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  #gameContainer {
    position: relative;
  }
  canvas {
    display: block;
    border: 2px solid #333;
  }
  #ui {
    position: absolute;
    top: 10px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 20px;
    color: #fff;
    font-size: 18px;
    pointer-events: none;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.8);
    color: #fff;
    text-align: center;
  }
  #overlay.hidden { display: none; }
  #overlay h1 { font-size: 48px; color: #ff0; margin-bottom: 20px; text-shadow: 0 0 10px #ff0; }
  #overlay h2 { font-size: 32px; color: #f00; margin-bottom: 20px; }
  #overlay p { font-size: 20px; margin: 10px 0; }
  #overlay .blink { animation: blink 1s infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  .score-display { color: #0ff; }
  .lives-display { color: #0f0; }
  .level-display { color: #ff0; }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas" width="480" height="640"></canvas>
  <div id="ui">
    <span class="score-display">SCORE: <span id="score">0</span></span>
    <span class="level-display">LEVEL: <span id="level">1</span></span>
    <span class="lives-display">LIVES: <span id="lives">3</span></span>
  </div>
  <div id="overlay">
    <h1>GALAGA</h1>
    <p class="blink">Press ENTER or SPACE to Start</p>
    <p style="margin-top: 30px; font-size: 14px; color: #888;">
      ← → to Move | SPACE to Shoot
    </p>
  </div>
</div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const levelEl = document.getElementById('level');

const W = canvas.width;
const H = canvas.height;

// Game state
let gameState = 'menu'; // menu, playing, gameOver, levelComplete
let score = 0;
let lives = 3;
let level = 1;
let highScore = parseInt(localStorage.getItem('galagaHighScore')) || 0;

// Stars background
const stars = [];
for (let i = 0; i < 100; i++) {
  stars.push({
    x: Math.random() * W,
    y: Math.random() * H,
    speed: 0.5 + Math.random() * 1.5,
    size: Math.random() * 2
  });
}

// Player
const player = {
  x: W / 2,
  y: H - 60,
  width: 32,
  height: 32,
  speed: 5,
  shootCooldown: 0,
  invincible: 0
};

// Input
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if ((e.code === 'Enter' || e.code === 'Space') && gameState === 'menu') {
    startGame();
  } else if ((e.code === 'Enter' || e.code === 'Space') && gameState === 'gameOver') {
    startGame();
  }
  if (e.code === 'Space') e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// Game objects
let playerBullets = [];
let enemyBullets = [];
let enemies = [];
let particles = [];
let divingEnemies = [];

// Enemy types
const ENEMY_TYPES = {
  boss: { color: '#f00', points: 150, width: 28, height: 28, hp: 2 },
  elite: { color: '#f0f', points: 100, width: 24, height: 24, hp: 1 },
  grunt: { color: '#0ff', points: 50, width: 20, height: 20, hp: 1 }
};

function createEnemyFormation() {
  enemies = [];
  divingEnemies = [];
  const rows = 4;
  const cols = 8;
  const spacingX = 45;
  const spacingY = 40;
  const offsetX = (W - (cols - 1) * spacingX) / 2;
  const offsetY = 80;

  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      let type, hp;
      if (row === 0) { type = 'boss'; hp = 2; }
      else if (row <= 2) { type = 'elite'; hp = 1; }
      else { type = 'grunt'; hp = 1; }

      enemies.push({
        x: offsetX + col * spacingX,
        y: offsetY + row * spacingY,
        baseX: offsetX + col * spacingX,
        baseY: offsetY + row * spacingY,
        type: type,
        hp: hp,
        alive: true,
        width: ENEMY_TYPES[type].width,
        height: ENEMY_TYPES[type].height,
        row: row,
        col: col,
        animPhase: Math.random() * Math.PI * 2
      });
    }
  }
}

function startGame() {
  score = 0;
  lives = 3;
  level = 1;
  player.x = W / 2;
  player.invincible = 0;
  playerBullets = [];
  enemyBullets = [];
  particles = [];
  createEnemyFormation();
  gameState = 'playing';
  overlay.classList.add('hidden');
  updateUI();
}

function updateUI() {
  scoreEl.textContent = score;
  livesEl.textContent = lives;
  levelEl.textContent = level;
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x: x,
      y: y,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8,
      life: 30 + Math.random() * 20,
      color: color,
      size: 2 + Math.random() * 3
    });
  }
}

function startDiveBomb() {
  const aliveEnemies = enemies.filter(e => e.alive);
  if (aliveEnemies.length === 0) return;

  const numDivers = Math.min(1 + Math.floor(level / 2), 4);
  for (let i = 0; i < numDivers; i++) {
    const enemy = aliveEnemies[Math.floor(Math.random() * aliveEnemies.length)];
    if (enemy && !divingEnemies.includes(enemy)) {
      divingEnemies.push(enemy);
      enemy.divePhase = 0;
      enemy.diveStartX = enemy.x;
      enemy.diveStartY = enemy.y;
      enemy.diveTargetX = player.x + (Math.random() - 0.5) * 100;
      enemy.diveSpeed = 2 + level * 0.3;
    }
  }
}

function drawPlayer() {
  if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0) return;

  const x = player.x;
  const y = player.y;

  // Ship body
  ctx.fillStyle = '#0f0';
  ctx.beginPath();
  ctx.moveTo(x, y - 16);
  ctx.lineTo(x - 14, y + 12);
  ctx.lineTo(x - 6, y + 8);
  ctx.lineTo(x - 6, y + 16);
  ctx.lineTo(x + 6, y + 16);
  ctx.lineTo(x + 6, y + 8);
  ctx.lineTo(x + 14, y + 12);
  ctx.closePath();
  ctx.fill();

  // Cockpit
  ctx.fillStyle = '#0ff';
  ctx.beginPath();
  ctx.arc(x, y - 2, 4, 0, Math.PI * 2);
  ctx.fill();

  // Engine glow
  ctx.fillStyle = '#ff0';
  ctx.beginPath();
  ctx.moveTo(x - 4, y + 16);
  ctx.lineTo(x, y + 20 + Math.random() * 4);
  ctx.lineTo(x + 4, y + 16);
  ctx.fill();
}

function drawEnemy(enemy) {
  const x = enemy.x;
  const y = enemy.y;
  const type = ENEMY_TYPES[enemy.type];
  const wobble = Math.sin(enemy.animPhase) * 3;

  ctx.fillStyle = type.color;

  if (enemy.type === 'boss') {
    // Boss - larger with wings
    ctx.beginPath();
    ctx.moveTo(x, y - 14);
    ctx.lineTo(x - 14 + wobble, y);
    ctx.lineTo(x - 10, y + 10);
    ctx.lineTo(x - 4, y + 6);
    ctx.lineTo(x, y + 14);
    ctx.lineTo(x + 4, y + 6);
    ctx.lineTo(x + 10, y + 10);
    ctx.lineTo(x + 14 - wobble, y);
    ctx.closePath();
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(x - 5, y - 2, 3, 0, Math.PI * 2);
    ctx.arc(x + 5, y - 2, 3, 0, Math.PI * 2);
    ctx.fill();
  } else if (enemy.type === 'elite') {
    // Elite - butterfly shape
    ctx.beginPath();
    ctx.moveTo(x, y - 12);
    ctx.lineTo(x - 12 + wobble, y - 6);
    ctx.lineTo(x - 8, y + 4);
    ctx.lineTo(x - 4, y + 12);
    ctx.lineTo(x + 4, y + 12);
    ctx.lineTo(x + 8, y + 4);
    ctx.lineTo(x + 12 - wobble, y - 6);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // Grunt - simple diamond
    ctx.beginPath();
    ctx.moveTo(x, y - 10);
    ctx.lineTo(x - 10 + wobble, y);
    ctx.lineTo(x, y + 10);
    ctx.lineTo(x + 10 - wobble, y);
    ctx.closePath();
    ctx.fill();
  }
}

function drawBullet(bullet, color) {
  ctx.fillStyle = color;
  ctx.fillRect(bullet.x - 2, bullet.y - 6, 4, 12);
  ctx.fillStyle = '#fff';
  ctx.fillRect(bullet.x - 1, bullet.y - 4, 2, 8);
}

function drawEnemyBullet(bullet) {
  ctx.fillStyle = '#f80';
  ctx.beginPath();
  ctx.arc(bullet.x, bullet.y, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ff0';
  ctx.beginPath();
  ctx.arc(bullet.x, bullet.y, 1.5, 0, Math.PI * 2);
  ctx.fill();
}

function drawParticles() {
  particles.forEach(p => {
    const alpha = p.life / 50;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  });
  ctx.globalAlpha = 1;
}

function drawStars() {
  ctx.fillStyle = '#fff';
  stars.forEach(star => {
    ctx.globalAlpha = 0.3 + Math.random() * 0.7;
    ctx.fillRect(star.x, star.y, star.size, star.size);
  });
  ctx.globalAlpha = 1;
}

function update() {
  // Stars
  stars.forEach(star => {
    star.y += star.speed;
    if (star.y > H) { star.y = 0; star.x = Math.random() * W; }
  });

  if (gameState !== 'playing') return;

  // Player movement
  if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
  if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;
  player.x = Math.max(20, Math.min(W - 20, player.x));

  if (player.invincible > 0) player.invincible--;

  // Shooting
  if (player.shootCooldown > 0) player.shootCooldown--;
  if (keys['Space'] && player.shootCooldown === 0) {
    playerBullets.push({ x: player.x, y: player.y - 20 });
    player.shootCooldown = 15;
  }

  // Player bullets
  playerBullets = playerBullets.filter(b => {
    b.y -= 8;
    return b.y > -10;
  });

  // Enemy formation movement
  const time = Date.now() / 1000;
  const formationOffsetX = Math.sin(time * 0.5) * 30;
  const formationOffsetY = Math.sin(time * 0.3) * 10;

  enemies.forEach(enemy => {
    if (!enemy.alive) return;
    if (divingEnemies.includes(enemy)) return;

    enemy.x = enemy.baseX + formationOffsetX;
    enemy.y = enemy.baseY + formationOffsetY;
    enemy.animPhase += 0.1;
  });

  // Diving enemies
  divingEnemies.forEach((enemy, idx) => {
    if (!enemy.alive) return;
    enemy.divePhase += 0.02;

    const t = enemy.divePhase;
    enemy.x = enemy.diveStartX + (enemy.diveTargetX - enemy.diveStartX) * t + Math.sin(t * 10) * 50;
    enemy.y = enemy.diveStartY + (H + 50 - enemy.diveStartY) * t;

    // Shoot while diving
    if (Math.random() < 0.03 * level) {
      const dx = player.x - enemy.x;
      const dy = player.y - enemy.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      enemyBullets.push({
        x: enemy.x,
        y: enemy.y + 10,
        vx: (dx / dist) * 4,
        vy: (dy / dist) * 4
      });
    }

    if (enemy.y > H + 30) {
      enemy.y = enemy.baseY;
      enemy.x = enemy.baseX;
      divingEnemies.splice(idx, 1);
    }
  });

  // Enemy shooting
  if (Math.random() < 0.02 + level * 0.005) {
    const shooters = enemies.filter(e => e.alive && !divingEnemies.includes(e));
    if (shooters.length > 0) {
      const shooter = shooters[Math.floor(Math.random() * shooters.length)];
      enemyBullets.push({
        x: shooter.x,
        y: shooter.y + 15,
        vx: (Math.random() - 0.5) * 2,
        vy: 3 + level * 0.2
      });
    }
  }

  // Start dive bombs periodically
  if (Math.random() < 0.005 * level) startDiveBomb();

  // Enemy bullets
  enemyBullets = enemyBullets.filter(b => {
    b.x += b.vx;
    b.y += b.vy;
    return b.y < H + 10 && b.y > -10 && b.x > -10 && b.x < W + 10;
  });

  // Collision: player bullets vs enemies
  playerBullets.forEach((bullet, bi) => {
    enemies.forEach(enemy => {
      if (!enemy.alive) return;
      const dx = bullet.x - enemy.x;
      const dy = bullet.y - enemy.y;
      if (Math.abs(dx) < enemy.width && Math.abs(dy) < enemy.height) {
        enemy.hp--;
        playerBullets.splice(bi, 1);
        if (enemy.hp <= 0) {
          enemy.alive = false;
          score += ENEMY_TYPES[enemy.type].points;
          spawnParticles(enemy.x, enemy.y, ENEMY_TYPES[enemy.type].color, 15);
          const diveIdx = divingEnemies.indexOf(enemy);
          if (diveIdx >= 0) divingEnemies.splice(diveIdx, 1);
        } else {
          spawnParticles(bullet.x, bullet.y, '#ff0', 5);
        }
        updateUI();
      }
    });
  });

  // Collision: enemy bullets vs player
  if (player.invincible === 0) {
    enemyBullets.forEach((bullet, bi) => {
      const dx = bullet.x - player.x;
      const dy = bullet.y - player.y;
      if (Math.abs(dx) < 12 && Math.abs(dy) < 16) {
        enemyBullets.splice(bi, 1);
        playerHit();
      }
    });
  }

  // Collision: diving enemies vs player
  if (player.invincible === 0) {
    divingEnemies.forEach(enemy => {
      if (!enemy.alive) return;
      const dx = enemy.x - player.x;
      const dy = enemy.y - player.y;
      if (Math.abs(dx) < 20 && Math.abs(dy) < 24) {
        enemy.alive = false;
        spawnParticles(enemy.x, enemy.y, ENEMY_TYPES[enemy.type].color, 20);
        playerHit();
      }
    });
  }

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.95;
    p.vy *= 0.95;
    p.life--;
    return p.life > 0;
  });

  // Check level complete
  if (enemies.every(e => !e.alive)) {
    level++;
    levelEl.textContent = level;
    createEnemyFormation();
    playerBullets = [];
    enemyBullets = [];
    divingEnemies = [];
  }
}

function playerHit() {
  lives--;
  spawnParticles(player.x, player.y, '#0f0', 30);
  player.invincible = 120;
  updateUI();

  if (lives <= 0) {
    gameState = 'gameOver';
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('galagaHighScore', highScore);
    }
    overlay.classList.remove('hidden');
    overlay.innerHTML = `
      <h2>GAME OVER</h2>
      <p class="score-display">Final Score: ${score}</p>
      <p style="color: #ff0;">High Score: ${highScore}</p>
      <p class="blink" style="margin-top: 30px;">Press ENTER or SPACE to Restart</p>
    `;
  }
}

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  drawStars();

  if (gameState === 'playing' || gameState === 'gameOver') {
    // Draw enemies
    enemies.forEach(enemy => {
      if (enemy.alive) drawEnemy(enemy);
    });

    // Draw player
    if (gameState === 'playing') drawPlayer();

    // Draw bullets
    playerBullets.forEach(b => drawBullet(b, '#0ff'));
    enemyBullets.forEach(b => drawEnemyBullet(b));

    // Draw particles
    drawParticles();
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
