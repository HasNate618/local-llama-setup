<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaga Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-canvas {
            image-rendering: pixelated;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        /* UI Overlay */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            color: #fff;
            text-shadow: 0 0 5px #0ff;
            font-size: 18px;
            z-index: 10;
        }

        .hud-left, .hud-right {
            display: flex;
            gap: 30px;
        }

        .hud-item {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border: 1px solid #0ff;
            border-radius: 4px;
        }

        .hud-label {
            color: #0ff;
            font-size: 12px;
            text-transform: uppercase;
        }

        .hud-value {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
        }

        /* Screens */
        .screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.9);
            padding: 40px 60px;
            border: 2px solid #0ff;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.4), inset 0 0 50px rgba(0, 255, 255, 0.1);
            z-index: 20;
        }

        .screen h1 {
            color: #0ff;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .screen p {
            color: #fff;
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .screen p span {
            color: #f0f;
            text-shadow: 0 0 5px #f0f;
        }

        .btn {
            background: transparent;
            color: #0ff;
            border: 2px solid #0ff;
            padding: 15px 40px;
            font-size: 18px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 20px;
        }

        .btn:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 20px #0ff;
        }

        .hidden {
            display: none !important;
        }

        /* Scanline effect */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1),
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 50;
        }

        /* CRT glow */
        .crt-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 50%, rgba(0, 0, 0, 0.4) 100%);
            pointer-events: none;
            z-index: 40;
        }

        /* Health bar */
        #health-bar-container {
            width: 200px;
            height: 20px;
            background: #333;
            border: 1px solid #fff;
            overflow: hidden;
        }

        #health-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #f00, #ff0);
            transition: width 0.3s ease;
        }

        /* Wave indicator */
        #wave-indicator {
            color: #ff0;
            text-shadow: 0 0 5px #ff0;
        }

        /* High score */
        #high-score {
            color: #ff0;
            text-shadow: 0 0 5px #ff0;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>

        <div class="scanlines"></div>
        <div class="crt-glow"></div>

        <!-- HUD -->
        <div class="ui-layer" id="hud">
            <div class="hud">
                <div class="hud-left">
                    <div class="hud-item">
                        <div class="hud-label">Health</div>
                        <div id="health-bar-container"><div id="health-bar"></div></div>
                    </div>
                    <div class="hud-item">
                        <div class="hud-label">Wave</div>
                        <div class="hud-value" id="wave-indicator">1</div>
                    </div>
                </div>
                <div class="hud-right">
                    <div class="hud-item">
                        <div class="hud-label">Score</div>
                        <div class="hud-value" id="score-display">0</div>
                    </div>
                    <div class="hud-item">
                        <div class="hud-label">High Score</div>
                        <div class="hud-value" id="high-score">0</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Start Screen -->
        <div class="screen" id="start-screen">
            <h1>Galaga Clone</h1>
            <p>
                Defend Earth from the alien invasion!<br><br>
                <span>WASD/Arrows</span> to move<br>
                <span>Space</span> or <span>Click</span> to shoot<br>
                Destroy all enemies before they reach you!
            </p>
            <button class="btn" id="start-btn">Start Mission</button>
        </div>

        <!-- Game Over Screen -->
        <div class="screen hidden" id="game-over-screen">
            <h1 style="color: #f00; text-shadow: 0 0 10px #f00;">Game Over</h1>
            <p>Your score: <span id="final-score" style="color: #fff;">0</span></p>
            <p>Wave reached: <span id="final-wave" style="color: #ff0;">1</span></p>
            <button class="btn" id="restart-btn">Try Again</button>
        </div>

        <!-- Victory Screen -->
        <div class="screen hidden" id="victory-screen">
            <h1 style="color: #ff0; text-shadow: 0 0 10px #ff0;">Victory!</h1>
            <p>All enemies destroyed!</p>
            <p>Final Score: <span id="victory-score" style="color: #fff;">0</span></p>
            <button class="btn" id="play-again-btn">Play Again</button>
        </div>
    </div>

    <script>
        // Game Constants
        const CANVAS_WIDTH = 800;
        const CANVAS_HEIGHT = 600;
        const PLAYER_SPEED = 5;
        const BULLET_SPEED = 10;
        const ENEMY_BASE_SPEED = 1.5;

        // Colors
        const COLORS = {
            player: '#0ff',
            playerBullet: '#fff',
            enemyRed: '#f00',
            enemyGreen: '#0f0',
            enemyBlue: '#00f',
            enemyPurple: '#f0f',
            star: '#fff'
        };

        // Game State
        let gameState = {
            running: false,
            score: 0,
            wave: 1,
            highScore: localStorage.getItem('galaga_highscore') || 0,
            health: 100,
            enemies: [],
            bullets: [],
            particles: [],
            stars: [],
            player: null,
            enemyDirection: 1,
            enemyMoveTimer: 0,
            enemyMoveInterval: 60,
            enemySpawnTimer: 0,
            enemySpawnRate: 60,
            shake: 0
        };

        // DOM Elements
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const victoryScreen = document.getElementById('victory-screen');
        const hud = document.getElementById('hud');

        // Initialize Canvas
        function initCanvas() {
            canvas.width = CANVAS_WIDTH;
            canvas.height = CANVAS_HEIGHT;
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
        }

        function resizeCanvas() {
            const scale = Math.min(
                window.innerWidth / CANVAS_WIDTH,
                window.innerHeight / CANVAS_HEIGHT
            );
            canvas.style.width = `${CANVAS_WIDTH * scale}px`;
            canvas.style.height = `${CANVAS_HEIGHT * scale}px`;
        }

        // Input Handling
        const keys = {};
        const mouse = { x: 0, y: 0, down: false };

        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space' && gameState.running) {
                e.preventDefault();
                player.shoot();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            mouse.x = (e.clientX - rect.left) * scaleX;
            mouse.y = (e.clientY - rect.top) * scaleY;
        });

        canvas.addEventListener('mousedown', () => { mouse.down = true; player.shoot(); });
        canvas.addEventListener('mouseup', () => { mouse.down = false; });

        // Player Class
        class Player {
            constructor() {
                this.width = 60;
                this.height = 50;
                this.x = CANVAS_WIDTH / 2 - this.width / 2;
                this.y = CANVAS_HEIGHT - 100;
                this.color = COLORS.player;
                this.cooldown = 0;
                this.invulnerable = 0;
            }

            update() {
                // Movement
                if (keys['KeyA'] || keys['ArrowLeft']) this.x -= PLAYER_SPEED;
                if (keys['KeyD'] || keys['ArrowRight']) this.x += PLAYER_SPEED;
                if (keys['KeyW'] || keys['ArrowUp']) this.y -= PLAYER_SPEED;
                if (keys['KeyS'] || keys['ArrowDown']) this.y += PLAYER_SPEED;

                // Boundaries
                this.x = Math.max(0, Math.min(CANVAS_WIDTH - this.width, this.x));
                this.y = Math.max(0, Math.min(CANVAS_HEIGHT - this.height, this.y));

                // Cooldowns
                if (this.cooldown > 0) this.cooldown--;
                if (this.invulnerable > 0) this.invulnerable--;
            }

            draw() {
                ctx.save();

                // Glow effect
                ctx.shadowBlur = 25;
                ctx.shadowColor = '#0ff';

                // Ship body
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.moveTo(this.x + this.width / 2, this.y);
                ctx.lineTo(this.x + this.width, this.y + this.height);
                ctx.lineTo(this.x + this.width * 0.7, this.y + this.height - 10);
                ctx.lineTo(this.x + this.width * 0.4, this.y + this.height);
                ctx.lineTo(this.x + this.width * 0.3, this.y + this.height - 15);
                ctx.lineTo(this.x + this.width * 0.2, this.y + this.height);
                ctx.lineTo(this.x, this.y + this.height - 10);
                ctx.lineTo(this.x + this.width * 0.3, this.y + this.height);
                ctx.lineTo(this.x + this.width * 0.4, this.y + this.height - 15);
                ctx.lineTo(this.x + this.width * 0.7, this.y + this.height);
                ctx.closePath();
                ctx.fill();

                // Cockpit
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(this.x + this.width / 2, this.y + 15, 4, 0, Math.PI * 2);
                ctx.fill();

                // Engine flame
                if (keys['KeyS'] || keys['ArrowDown']) {
                    ctx.fillStyle = '#ff6600';
                    ctx.shadowColor = '#ff6600';
                    ctx.beginPath();
                    ctx.moveTo(this.x + this.width * 0.3, this.y + this.height - 8);
                    ctx.lineTo(this.x + this.width * 0.7, this.y + this.height - 8);
                    ctx.lineTo(this.x + this.width * 0.5, this.y + this.height + 12 + Math.random() * 5);
                    ctx.closePath();
                    ctx.fill();
                }

                ctx.restore();
            }

            shoot() {
                if (this.cooldown <= 0) {
                    gameState.bullets.push(new Bullet(
                        this.x + this.width / 2,
                        this.y,
                        0, -BULLET_SPEED, 'player'
                    ));
                    this.cooldown = 8;
                }
            }

            hit() {
                if (this.invulnerable > 0) return false;

                this.health -= 25;
                this.invulnerable = 60; // 1 second at 60fps
                createExplosion(this.x + this.width/2, this.y + this.height/2, 20, COLORS.player);
                gameState.shake = 10;
                updateHUD();

                if (this.health <= 0) {
                    gameOver();
                    return true;
                }
                return false;
            }
        }

        // Bullet Class
        class Bullet {
            constructor(x, y, vx, vy, type) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.type = type; // 'player' or 'enemy'
                this.width = type === 'player' ? 4 : 6;
                this.height = type === 'player' ? 12 : 8;
                this.active = true;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.type === 'player' && this.y < 0) this.active = false;
                if (this.type === 'enemy' && this.y > CANVAS_HEIGHT) this.active = false;
            }

            draw() {
                ctx.save();
                ctx.shadowBlur = 10;

                if (this.type === 'player') {
                    ctx.shadowColor = COLORS.playerBullet;
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(this.x - this.width/2, this.y - this.height/2, this.width, this.height);
                } else {
                    ctx.shadowColor = COLORS.enemyRed;
                    ctx.fillStyle = '#f80';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.width/2, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        // Enemy Class
        class Enemy {
            constructor(type, x, y) {
                this.type = type; // 'red', 'green', 'blue', 'purple'
                this.x = x;
                this.y = y;
                this.width = 36;
                this.height = 32;
                this.vx = 0;
                this.vy = 0;
                this.hp = type === 'purple' ? 3 : (type === 'blue' ? 2 : 1);
                this.color = COLORS[type];
                this.active = true;
                this.shootTimer = Math.random() * 100;
                this.frozen = false;
            }

            update() {
                if (this.frozen) return;

                // Movement patterns based on type
                switch(this.type) {
                    case 'red':
                        // Zigzag
                        this.x += Math.sin(gameState.enemyMoveTimer * 0.05) * 2;
                        this.y += ENEMY_BASE_SPEED + gameState.wave * 0.1;
                        break;
                    case 'green':
                        // Sine wave
                        this.x += Math.cos(gameState.enemyMoveTimer * 0.03) * 3;
                        this.y += ENEMY_BASE_SPEED * 0.8;
                        break;
                    case 'blue':
                        // Fast vertical
                        this.y += ENEMY_BASE_SPEED * 1.5;
                        break;
                    case 'purple':
                        // Erratic
                        this.vx += (Math.random() - 0.5) * 2;
                        this.vy += (Math.random() - 0.5) * 2;
                        this.vx *= 0.95;
                        this.vy *= 0.95;
                        this.x += this.vx;
                        this.y += this.vy;
                        break;
                }

                // Boundaries
                if (this.type === 'purple') {
                    if (this.x < 0 || this.x > CANVAS_WIDTH - this.width) this.vx *= -1;
                    if (this.y < 0 || this.y > CANVAS_HEIGHT - this.height) this.vy *= -1;
                }

                // Shooting
                this.shootTimer++;
                if (this.shootTimer > 120 - gameState.wave * 5 && Math.random() < 0.02) {
                    this.shoot();
                }
            }

            shoot() {
                if (this.type === 'red' && !this.frozen) {
                    gameState.bullets.push(new Bullet(
                        this.x + this.width/2,
                        this.y + this.height,
                        (Math.random() - 0.5) * 2,
                        3 + gameState.wave * 0.2,
                        'enemy'
                    ));
                } else if (this.type === 'purple') {
                    // Spread shot
                    for (let i = -1; i <= 1; i++) {
                        gameState.bullets.push(new Bullet(
                            this.x + this.width/2,
                            this.y + this.height,
                            i * 2,
                            4 + gameState.wave * 0.3,
                            'enemy'
                        ));
                    }
                }
            }

            draw() {
                ctx.save();

                // Glow
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;

                // Body
                ctx.fillStyle = this.color;

                if (this.type === 'red') {
                    // Fighter shape
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x + this.width, this.y);
                    ctx.lineTo(this.x + this.width * 0.8, this.y + this.height);
                    ctx.lineTo(this.x + this.width * 0.5, this.y + this.height - 10);
                    ctx.lineTo(this.x + this.width * 0.2, this.y + this.height);
                    ctx.closePath();
                    ctx.fill();

                    // Wing detail
                    ctx.fillStyle = '#f80';
                    ctx.fillRect(this.x + this.width * 0.3, this.y + this.height - 20, this.width * 0.4, 10);
                } else if (this.type === 'green') {
                    // Insect shape
                    ctx.beginPath();
                    ctx.moveTo(this.x + this.width/2, this.y);
                    ctx.lineTo(this.x + this.width, this.y + this.height/2);
                    ctx.lineTo(this.x + this.width/2, this.y + this.height);
                    ctx.lineTo(this.x, this.y + this.height/2);
                    ctx.closePath();
                    ctx.fill();

                    // Eye
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(this.x + this.width/2, this.y + 10, 4, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.type === 'blue') {
                    // Fast shape
                    ctx.beginPath();
                    ctx.moveTo(this.x + this.width/2, this.y);
                    ctx.lineTo(this.x + this.width, this.y + this.height);
                    ctx.lineTo(this.x, this.y + this.height);
                    ctx.closePath();
                    ctx.fill();
                } else if (this.type === 'purple') {
                    // Boss-like
                    ctx.fillStyle = '#880';
                    ctx.fillRect(this.x + 5, this.y + 15, this.width - 10, 10);

                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.moveTo(this.x + this.width/2, this.y + this.height - 10);
                    ctx.lineTo(this.x + this.width, this.y + this.height);
                    ctx.lineTo(this.x + this.width/2, this.y + this.height - 5);
                    ctx.lineTo(this.x, this.y + this.height);
                    ctx.closePath();
                    ctx.fill();
                }

                // Engine trail
                if (Math.random() < 0.3) {
                    createParticle(
                        this.x + this.width * 0.3,
                        this.y + this.height - 5,
                        (Math.random() - 0.5) * 2,
                        Math.random() * 2 + 1,
                        '#f80',
                        2
                    );
                }

                ctx.restore();
            }

            hit(bulletType) {
                if (this.hp <= 0 || !this.active) return false;

                this.hp--;
                createExplosion(this.x + this.width/2, this.y + this.height/2, 10, this.color);
                gameState.shake = 3;

                // Death animation
                if (this.hp <= 0) {
                    this.active = false;
                    gameState.score += getEnemyScore(this.type);
                    updateHUD();

                    // Explosion
                    createExplosion(this.x + this.width/2, this.y + this.height/2, 30, this.color);

                    // Bonus bullets
                    if (this.type === 'purple') {
                        for (let i = 0; i < 8; i++) {
                            gameState.bullets.push(new Bullet(
                                this.x + this.width/2,
                                this.y + this.height/2,
                                (Math.random() - 0.5) * 10,
                                (Math.random() - 0.5) * 10,
                                'player'
                            ));
                        }
                    }
                } else {
                    // Flash effect
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                }

                return this.hp <= 0;
            }
        }

        function getEnemyScore(type) {
            const scores = {
                red: 100,
                green: 200,
                blue: 300,
                purple: 1000
            };
            return scores[type] || 100;
        }

        // Particle System
        class Particle {
            constructor(x, y, vx, vy, color, life) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.life = life;
                this.maxLife = life;
                this.size = Math.random() * 4 + 2;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
                this.vx *= 0.98;
                this.vy *= 0.98;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life / this.maxLife;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function createExplosion(x, y, count, color) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                gameState.particles.push(new Particle(
                    x,
                    y,
                    Math.cos(angle) * speed,
                    Math.sin(angle) * speed,
                    color,
                    30 + Math.random() * 20
                ));
            }
        }

        function createParticle(x, y, vx, vy, color, life) {
            gameState.particles.push(new Particle(x, y, vx, vy, color, life));
        }

        // Starfield
        class Star {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * CANVAS_WIDTH;
                this.y = Math.random() * CANVAS_HEIGHT;
                this.size = Math.random() * 2 + 1;
                this.speed = Math.random() * 3 + 1 + gameState.wave * 0.5;
                this.brightness = Math.random() * 0.5 + 0.5;
            }

            update() {
                this.y += this.speed;
                if (this.y > CANVAS_HEIGHT) this.reset();
            }

            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.brightness})`;
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
        }

        // Game Logic
        function initGame() {
            gameState.player = new Player();
            gameState.enemies = [];
            gameState.bullets = [];
            gameState.particles = [];
            gameState.score = 0;
            gameState.wave = 1;
            gameState.health = 100;
            gameState.enemySpawnRate = 60;
            gameState.enemyMoveInterval = 60;

            // Create starfield
            gameState.stars = [];
            for (let i = 0; i < 100; i++) {
                gameState.stars.push(new Star());
            }

            // Spawn initial enemies
            spawnEnemies();

            updateHUD();
        }

        function spawnEnemies() {
            const enemyTypes = ['red', 'green', 'blue', 'purple'];
            const numEnemies = 3 + Math.min(gameState.wave, 5);
            const startX = 50;
            const startY = 50;
            const spacingX = 60;
            const spacingY = 40;

            for (let i = 0; i < numEnemies; i++) {
                const type = enemyTypes[i % enemyTypes.length];
                gameState.enemies.push(new Enemy(type, startX + i * spacingX, startY));
            }
        }

        function update() {
            if (!gameState.running) return;

            // Update player
            gameState.player.update();

            // Update stars
            gameState.stars.forEach(star => star.update());

            // Update bullets
            gameState.bullets = gameState.bullets.filter(bullet => bullet.active);
            gameState.bullets.forEach(bullet => bullet.update());

            // Update enemies
            gameState.enemies = gameState.enemies.filter(enemy => enemy.active);
            gameState.enemies.forEach(enemy => enemy.update());

            // Enemy movement pattern
            gameState.enemyMoveTimer++;
            if (gameState.enemyMoveTimer > gameState.enemyMoveInterval) {
                gameState.enemyDirection *= -1;
                gameState.enemyMoveTimer = 0;
            }

            // Spawn enemies
            gameState.enemySpawnTimer++;
            if (gameState.enemySpawnTimer > gameState.enemySpawnRate) {
                spawnEnemies();
                gameState.enemySpawnTimer = 0;

                // Increase difficulty
                gameState.wave++;
                gameState.enemySpawnRate = Math.max(20, 60 - gameState.wave * 3);
                gameState.enemyMoveInterval = Math.max(30, 60 - gameState.wave * 2);
            }

            // Check for wave complete
            if (gameState.enemies.length === 0 && gameState.running) {
                // Victory condition
                victory();
            }

            // Update particles
            gameState.particles = gameState.particles.filter(p => p.life > 0);
            gameState.particles.forEach(particle => particle.update());

            // Screen shake decay
            if (gameState.shake > 0) gameState.shake *= 0.9;
            if (gameState.shake < 0.5) gameState.shake = 0;

            // Check collisions
            checkCollisions();

            draw();
        }

        function checkCollisions() {
            const player = gameState.player;

            // Bullet vs Enemy
            gameState.bullets.forEach(bullet => {
                if (bullet.type === 'player') {
                    gameState.enemies.forEach(enemy => {
                        if (!enemy.active && !bullet.active) return;

                        if (rectIntersect(
                            bullet.x - bullet.width/2, bullet.y - bullet.height/2, bullet.width, bullet.height,
                            enemy.x, enemy.y, enemy.width, enemy.height
                        )) {
                            bullet.active = false;
                            const killed = enemy.hit('player');
                            if (killed) {
                                createExplosion(enemy.x + enemy.width/2, enemy.y + enemy.height/2, 30, enemy.color);
                            }
                        }
                    });
                } else {
                    // Enemy bullet vs Player
                    if (!bullet.active || !player.active) return;

                    if (rectIntersect(
                        bullet.x - bullet.width/2, bullet.y - bullet.height/2, bullet.width, bullet.height,
                        player.x, player.y, player.width, player.height
                    )) {
                        bullet.active = false;
                        if (player.hit()) return;
                    }
                }
            });

            // Enemy vs Player collision
            gameState.enemies.forEach(enemy => {
                if (!enemy.active) return;

                if (rectIntersect(
                    enemy.x, enemy.y, enemy.width, enemy.height,
                    player.x, player.y, player.width, player.height
                )) {
                    createExplosion(player.x + player.width/2, player.y + player.height/2, 30, COLORS.player);
                    gameOver();
                }
            });
        }

        function rectIntersect(x1, y1, w1, h1, x2, y2, w2, h2) {
            return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
        }

        function draw() {
            // Clear with trail effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // Screen shake
            ctx.save();
            if (gameState.shake > 0) {
                const dx = (Math.random() - 0.5) * gameState.shake;
                const dy = (Math.random() - 0.5) * gameState.shake;
                ctx.translate(dx, dy);
            }

            // Draw stars
            gameState.stars.forEach(star => star.draw());

            // Draw player
            if (gameState.player.active) {
                gameState.player.draw();
            }

            // Draw enemies
            gameState.enemies.forEach(enemy => enemy.draw());

            // Draw bullets
            gameState.bullets.forEach(bullet => bullet.draw());

            // Draw particles
            gameState.particles.forEach(particle => particle.draw());

            ctx.restore();
        }

        function updateHUD() {
            document.getElementById('score-display').textContent = gameState.score;
            document.getElementById('high-score').textContent = gameState.highScore;
            document.getElementById('wave-indicator').textContent = gameState.wave;

            const healthBar = document.getElementById('health-bar');
            healthBar.style.width = `${Math.max(0, gameState.health)}%`;
        }

        function gameOver() {
            gameState.running = false;

            if (gameState.score > gameState.highScore) {
                gameState.highScore = gameState.score;
                localStorage.setItem('galaga_highscore', gameState.highScore);
            }

            document.getElementById('final-score').textContent = gameState.score;
            document.getElementById('final-wave').textContent = gameState.wave;
            gameOverScreen.classList.remove('hidden');
            hud.classList.add('hidden');
        }

        function victory() {
            gameState.running = false;

            document.getElementById('victory-score').textContent = gameState.score;
            victoryScreen.classList.remove('hidden');
            hud.classList.add('hidden');
        }

        // UI Controls
        document.getElementById('start-btn').addEventListener('click', () => {
            startScreen.classList.add('hidden');
            initGame();
            gameState.running = true;
            gameLoop();
        });

        document.getElementById('restart-btn').addEventListener('click', () => {
            gameOverScreen.classList.add('hidden');
            hud.classList.remove('hidden');
            initGame();
            gameState.running = true;
            gameLoop();
        });

        document.getElementById('play-again-btn').addEventListener('click', () => {
            victoryScreen.classList.add('hidden');
            hud.classList.remove('hidden');
            initGame();
            gameState.running = true;
            gameLoop();
        });

        // Game Loop
        function gameLoop() {
            update();
            requestAnimationFrame(gameLoop);
        }

        // Start
        initCanvas();
        document.getElementById('high-score').textContent = gameState.highScore;
    </script>
</body>
</html>
