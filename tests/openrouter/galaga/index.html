<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaga Clone</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  canvas {
    border: 2px solid #333;
    image-rendering: pixelated;
  }
  #ui-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    pointer-events: none;
  }
  #overlay {
    text-align: center;
    color: #fff;
    pointer-events: auto;
  }
  #overlay h1 {
    font-size: 48px;
    color: #ff0;
    text-shadow: 0 0 20px #ff0;
    margin-bottom: 20px;
  }
  #overlay h2 {
    font-size: 24px;
    color: #f00;
    margin-bottom: 10px;
  }
  #overlay p {
    font-size: 18px;
    margin-bottom: 20px;
    color: #0ff;
  }
  #overlay button {
    padding: 15px 40px;
    font-size: 20px;
    background: #00f;
    color: #fff;
    border: 2px solid #0ff;
    cursor: pointer;
    font-family: 'Courier New', monospace;
  }
  #overlay button:hover {
    background: #0ff;
    color: #000;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui-overlay">
  <div id="overlay">
    <h1 id="overlay-title">GALAGA</h1>
    <p id="overlay-info">Arrow Keys / WASD to Move<br>Space to Shoot</p>
    <button id="overlay-btn" onclick="startGame()">START GAME</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlay-title');
const overlayInfo = document.getElementById('overlay-info');
const overlayBtn = document.getElementById('overlay-btn');

const W = 480, H = 640;
canvas.width = W;
canvas.height = H;

// Game state
let state = 'menu'; // menu, playing, gameover
let score = 0, highScore = 0, lives = 3, wave = 0;
let player, bullets, enemies, enemyBullets, particles, stars;
let formationDir = 1, formationX = 0;
let diveTimer = 0, shootingCD = 0, waveDelay = 0;

// Stars background
function createStars() {
  stars = [];
  for (let i = 0; i < 100; i++) {
    stars.push({ x: Math.random() * W, y: Math.random() * H, speed: 0.5 + Math.random() * 2, size: Math.random() * 2 });
  }
}

function updateStars() {
  for (let s of stars) {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
  }
}

function drawStars() {
  for (let s of stars) {
    ctx.fillStyle = `rgba(255,255,255,${0.3 + s.size * 0.7})`;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }
}

// Player
function createPlayer() {
  return { x: W / 2, y: H - 50, w: 24, h: 20, invincible: 0 };
}

function drawPlayer() {
  let p = player;
  if (p.invincible > 0 && Math.floor(p.invincible * 10) % 2 === 0) return;
  
  // Ship body
  ctx.fillStyle = '#0ff';
  ctx.fillRect(p.x - 3, p.y - 10, 6, 20);
  
  // Wings
  ctx.fillStyle = '#08f';
  ctx.fillRect(p.x - 12, p.y + 2, 10, 6);
  ctx.fillRect(p.x + 2, p.y + 2, 10, 6);
  
  // Tail fins
  ctx.fillStyle = '#06f';
  ctx.fillRect(p.x - 10, p.y - 4, 3, 4);
  ctx.fillRect(p.x + 7, p.y - 4, 3, 4);
  
  // Cockpit
  ctx.fillStyle = '#fff';
  ctx.fillRect(p.x - 2, p.y - 6, 4, 4);
}

function updatePlayer() {
  let p = player;
  let speed = 4;
  
  if (keys['ArrowLeft'] || keys['a']) p.x -= speed;
  if (keys['ArrowRight'] || keys['d']) p.x += speed;
  p.x = Math.max(20, Math.min(W - 20, p.x));
  if (p.invincible > 0) p.invincible -= 1/60;
  
  // Shooting
  shootingCD -= 1/60;
  if ((keys[' '] || keys['Space']) && shootingCD <= 0) {
    shootingCD = 0.25;
    bullets.push({ x: p.x, y: p.y - 15, w: 3, h: 10 });
  }
}

// Bullets
function drawBullets() {
  ctx.fillStyle = '#ff0';
  for (let b of bullets) {
    ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
  }
}

function updateBullets() {
  for (let i = bullets.length - 1; i >= 0; i--) {
    bullets[i].y -= 8;
    if (bullets[i].y < -10) bullets.splice(i, 1);
  }
}

// Enemy bullets
function drawEnemyBullets() {
  ctx.fillStyle = '#f00';
  for (let b of enemyBullets) {
    ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
  }
}

function updateEnemyBullets() {
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    let b = enemyBullets[i];
    b.x += b.vx;
    b.y += b.vy;
    if (b.y > H + 10 || b.x < -10 || b.x > W + 10) enemyBullets.splice(i, 1);
  }
}

// Enemies
function createEnemies() {
  let enemies = [];
  let cols = 10, rows = 5;
  
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      let type = r < 1 ? 'boss' : r < 2 ? 'commander' : r < 4 ? 'soldier' : 'bee';
      enemies.push({
        baseX: 120 + c * 30,
        baseY: 40 + r * 30,
        x: 0, y: 0,
        w: 16, h: 16,
        alive: true,
        type: type,
        diving: false,
        divePhase: 0,
        diveStartTime: 0,
        hp: r < 2 ? 2 : 1,
        row: r,
        col: c,
        animFrame: 0
      });
    }
  }
  return enemies;
}

function drawEnemy(e) {
  let type = e.type;
  let colors = {
    'boss': ['#f0f', '#f08', '#808'],
    'commander': ['#f00', '#800', '#600'],
    'soldier': ['#0f0', '#080', '#060'],
    'bee': ['#ff0', '#fc0', '#860']
  };
  let c = colors[type] || ['#fff', '#888', '#444'];
  
  let pulse = Math.sin(performance.now() / 200 + e.baseX) * 0.5 + 0.5;
  
  // Body
  ctx.fillStyle = c[0];
  ctx.fillRect(e.x - 6, e.y - 4, 12, 10);
  
  // Antenna/Wings based on type
  if (type === 'boss') {
    // Boss has horns
    ctx.fillStyle = c[1];
    ctx.fillRect(e.x - 8, e.y - 8, 3, 6);
    ctx.fillRect(e.x + 5, e.y - 8, 3, 6);
    ctx.fillRect(e.x - 7, e.y + 2, 4, 4);
    ctx.fillRect(e.x + 3, e.y + 2, 4, 4);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(e.x - 3, e.y - 2, 2, 2);
    ctx.fillRect(e.x + 1, e.y - 2, 2, 2);
  } else if (type === 'commander') {
    // Commander has antenna
    ctx.fillStyle = c[1];
    ctx.fillRect(e.x - 2, e.y - 8, 1, 4);
    ctx.fillRect(e.x + 1, e.y - 8, 1, 4);
    // Eye
    ctx.fillStyle = c[pulse > 0.5 ? 2 : 1];
    ctx.fillRect(e.x - 1, e.y - 2, 2, 2);
  } else if (type === 'bee') {
    // Bee shape
    ctx.fillStyle = c[0];
    ctx.fillRect(e.x - 8, e.y - 2, 16, 6);
    ctx.fillStyle = c[2];
    ctx.fillRect(e.x - 4, e.y - 1, 2, 2);
    ctx.fillRect(e.x + 2, e.y - 1, 2, 2);
  } else {
    ctx.fillStyle = c[1];
    ctx.fillRect(e.x - 8, e.y - 2, 16, 8);
  }
}

function updateEnemies(dt) {
  // Formation movement
  formationX += formationDir * 0.5;
  if (formationX > 40 || formationX < -40) formationDir *= -1;
  
  for (let e of enemies) {
    if (!e.alive) continue;
    
    e.animFrame = Math.sin(performance.now() / 300 + e.baseX + e.baseY);
    
    if (e.diving) {
      // Dive bomb behavior
      e.divePhase += dt;
      if (e.divePhase < 1) {
        // Approach player with sine wave
        let t = e.divePhase / 1;
        e.x = e.diveTargetX * t + e.diveStartX * (1 - t);
        e.y = H + 40 + Math.sin(e.divePhase * 8) * 50;
      } else {
        // Return to formation
        e.diving = false;
        e.divePhase = 0;
      }
    } else {
      e.x = e.baseX + formationX + Math.sin(performance.now()/1000 + e.row) * 3;
      e.y = e.baseY + Math.sin(performance.now()/2000 + e.col) * 5;
    }
    
    // Random shooting
    if (enemyBullets.length < 5 + wave && Math.random() < 0.002 + wave * 0.001) {
      let angle = Math.atan2(player.y - e.y, player.x - e.x);
      let speed = 3 + wave * 0.3;
      enemyBullets.push({
        x: e.x, y: e.y + 8,
        w: 4, h: 8,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed
      });
    }
  }
  
  // Start dives from time to time
  diveTimer -= dt;
  if (diveTimer <= 0 && enemies.some(e => e.alive && !e.diving)) {
    diveTimer = Math.max(1.5 - wave * 0.2, 0.5);
    let alive = enemies.filter(e => e.alive && !e.diving);
    if (alive.length > 0) {
      let chosen = alive[Math.floor(Math.random() * alive.length)];
      chosen.diving = true;
      chosen.divePhase = 0;
      chosen.diveTargetX = player.x;
      chosen.diveStartX = chosen.x;
    }
  }
}

// Particles
function createExplosion(x, y, color) {
  for (let i = 0; i < 20; i++) {
    let angle = (Math.PI * 2 * i) / 20;
    let speed = 1 + Math.random() * 4;
    particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 0.5 + Math.random() * 0.5,
      color: color,
      size: 2 + Math.random() * 3
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (let p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// Collisions
function checkCollisions() {
  // Bullets hitting enemies
  for (let i = bullets.length - 1; i >= 0; i--) {
    let b = bullets[i];
    for (let e of enemies) {
      if (!e.alive) continue;
      if (b.x > e.x - e.w && b.x < e.x + e.w &&
          b.y > e.y - e.h/2 && b.y < e.y + e.h) {
        bullets.splice(i, 1);
        e.hp--;
        if (e.hp <= 0) {
          e.alive = false;
          let points = e.diving ? 200 : e.type === 'boss' ? 150 : e.type === 'commander' ? 100 : 50;
          score += points;
          createExplosion(e.x, e.y, e.type === 'boss' ? '#f0f' : e.type === 'commander' ? '#f00' : '#0f0');
        } else {
          createExplosion(b.x, b.y, '#fff');
        }
        break;
      }
    }
  }
  
  // Enemy bullets hitting player
  if (player.invincible <= 0) {
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
      let b = enemyBullets[i];
      if (Math.abs(b.x - player.x) < 10 && Math.abs(b.y - player.y) < 15) {
        enemyBullets.splice(i, 1);
        hitPlayer();
        break;
      }
    }
    
    // Diving enemies hitting player
    for (let e of enemies) {
      if (!e.alive || !e.diving) continue;
      if (Math.abs(e.x - player.x) < 16 && Math.abs(e.y - player.y) < 20) {
        e.alive = false;
        createExplosion(e.x, e.y, '#f0f');
        hitPlayer();
      }
    }
  }
  
  // Check if all enemies dead -> next wave
  if (enemies.every(e => !e.alive)) {
    waveDelay += 1/60;
    if (waveDelay > 1.5) {
      wave++;
      waveDelay = 0;
      enemies = createEnemies();
      enemyBullets = [];
      bullets = [];
      formationX = 0;
    }
  }
}

function hitPlayer() {
  lives--;
  createExplosion(player.x, player.y, '#0ff');
  player.invincible = 2;
  player.x = W / 2;
  if (lives <= 0) {
    state = 'gameover';
    showOverlay('GAME OVER', `Score: ${score}`, 'PLAY AGAIN');
  }
}

// HUD
function drawHUD() {
  ctx.fillStyle = '#fff';
  ctx.font = '16px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText(`SCORE: ${score}`, 10, 25);
  ctx.fillText(`WAVE: ${wave + 1}`, W / 2 - 30, 25);
  ctx.textAlign = 'right';
  ctx.fillText(`HIGH: ${highScore}`, W - 10, 25);
  
  // Lives display
  ctx.textAlign = 'left';
  for (let i = 0; i < lives; i++) {
    ctx.fillStyle = '#0ff';
    ctx.fillRect(10 + i * 18, H - 20, 12, 14);
    ctx.fillStyle = '#06f';
    ctx.fillRect(6 + i * 18, H - 16, 4, 6);
  }
}

// Input
const keys = {};
window.addEventListener('keydown', (e) => {
  keys[e.key] = true;
  if ([' ', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
    e.preventDefault();
  }
});
window.addEventListener('keyup', (e) => {
  keys[e.key] = false;
});

// Touch support for mobile
let touchX = null;
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  keys[' '] = true;
  touchX = e.touches[0].clientX;
});
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (touchX !== null) {
    let diff = e.touches[0].clientX - touchX;
    let rect = canvas.getBoundingClientRect();
    let scale = W / rect.width;
    if (Math.abs(diff) > 5) {
      keys[diff > 0 ? 'ArrowRight' : 'ArrowLeft'] = true;
      keys[diff > 0 ? 'ArrowLeft' : 'ArrowRight'] = false;
      touchX = e.touches[0].clientX;
    }
  }
});
canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  keys[' '] = false;
  keys['ArrowLeft'] = false;
  keys['ArrowRight'] = false;
  touchX = null;
});

// UI helper
function showOverlay(title, info, btnText) {
  overlay.style.display = 'block';
  overlayTitle.textContent = title;
  overlayInfo.innerHTML = info;
  overlayBtn.textContent = btnText || 'START';
}

function hideOverlay() {
  overlay.style.display = 'none';
}

// Game loop
let lastTime = performance.now();
function gameLoop(now) {
  let dt = (now - lastTime) / 1000;
  lastTime = now;
  dt = Math.min(dt, 0.05); // Cap delta
  
  // Update
  updateStars();
  
  if (state === 'playing') {
    updatePlayer();
    updateBullets();
    updateEnemyBullets();
    updateEnemies(dt);
    updateParticles(dt);
    checkCollisions();
    if (score > highScore) highScore = score;
  } else if (state === 'gameover') {
    updateParticles(dt);
  }
  
  // Draw
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  drawStars();
  
  if (state === 'playing' || state === 'gameover') {
    drawBullets();
    drawEnemyBullets();
    
    for (let e of enemies) {
      if (e.alive) drawEnemy(e);
    }
    
    if (state === 'playing') {
      drawPlayer();
    }
    
    drawParticles();
    drawHUD();
  }
  
  requestAnimationFrame(gameLoop);
}

// Start/reset
function startGame() {
  state = 'playing';
  score = 0;
  lives = 3;
  wave = 0;
  waveDelay = 0;
  diveTimer = 2;
  formationDir = 1;
  formationX = 0;
  player = createPlayer();
  bullets = [];
  enemies = createEnemies();
  enemyBullets = [];
  particles = [];
  hideOverlay();
}

// Init
createStars();
showOverlay('GALAGA', 'Arrow Keys / WASD to Move<br>Space to Shoot', 'START GAME');
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
