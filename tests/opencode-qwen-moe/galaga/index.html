<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaga</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  font-family: 'Courier New', monospace;
}
canvas {
  border: 2px solid #333;
  image-rendering: pixelated;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = 480, H = 640;
canvas.width = W;
canvas.height = H;

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, duration, type = 'square', vol = 0.1) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(freq * 0.5, audioCtx.currentTime + duration);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}
function sfxShoot() { playSound(880, 0.08, 'square', 0.08); }
function sfxExplosion() { playSound(120, 0.3, 'sawtooth', 0.12); }
function sfxDive() { playSound(440, 0.15, 'sine', 0.05); }
function sfxPlayerHit() { playSound(200, 0.5, 'sawtooth', 0.15); }
function sfxLevelUp() {
  [523, 659, 784, 1047].forEach((f, i) => {
    setTimeout(() => playSound(f, 0.15, 'square', 0.08), i * 100);
  });
}

// Stars background
const stars = [];
for (let i = 0; i < 120; i++) {
  stars.push({ x: Math.random() * W, y: Math.random() * H, speed: 0.3 + Math.random() * 1.5, size: Math.random() * 2 + 0.5 });
}

// Sprite drawing functions
function drawPlayer(x, y) {
  ctx.fillStyle = '#0f0';
  ctx.beginPath();
  ctx.moveTo(x, y - 16);
  ctx.lineTo(x - 12, y + 12);
  ctx.lineTo(x - 4, y + 8);
  ctx.lineTo(x, y + 12);
  ctx.lineTo(x + 4, y + 8);
  ctx.lineTo(x + 12, y + 12);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#0a0';
  ctx.fillRect(x - 2, y + 8, 4, 6);
  // Engine flame
  if (Math.random() > 0.3) {
    ctx.fillStyle = '#f80';
    ctx.fillRect(x - 3, y + 14, 6, 4);
    ctx.fillStyle = '#ff0';
    ctx.fillRect(x - 1, y + 14, 2, 3);
  }
}

function drawBug1(x, y, frame) {
  ctx.fillStyle = '#f0f';
  ctx.beginPath();
  ctx.arc(x, y, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#f8f';
  ctx.fillRect(x - 10, y - 2 + Math.sin(frame) * 2, 6, 4);
  ctx.fillRect(x + 4, y - 2 + Math.sin(frame + 1) * 2, 6, 4);
  ctx.fillStyle = '#fff';
  ctx.fillRect(x - 3, y - 2, 2, 2);
  ctx.fillRect(x + 1, y - 2, 2, 2);
}

function drawBug2(x, y, frame) {
  ctx.fillStyle = '#f44';
  ctx.beginPath();
  ctx.moveTo(x, y - 10);
  ctx.lineTo(x - 10, y + 4);
  ctx.lineTo(x - 4, y + 10);
  ctx.lineTo(x + 4, y + 10);
  ctx.lineTo(x + 10, y + 4);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#faa';
  ctx.fillRect(x - 12, y - 4 + Math.sin(frame * 2) * 3, 8, 3);
  ctx.fillRect(x + 4, y - 4 + Math.sin(frame * 2 + 1) * 3, 8, 3);
  ctx.fillStyle = '#ff0';
  ctx.fillRect(x - 4, y - 4, 3, 3);
  ctx.fillRect(x + 1, y - 4, 3, 3);
}

function drawBug3(x, y, frame) {
  ctx.fillStyle = '#44f';
  ctx.beginPath();
  ctx.arc(x, y, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#88f';
  for (let i = 0; i < 4; i++) {
    const a = (i / 4) * Math.PI * 2 + frame * 0.1;
    ctx.fillRect(x + Math.cos(a) * 8 - 2, y + Math.sin(a) * 8 - 2, 4, 4);
  }
  ctx.fillStyle = '#fff';
  ctx.fillRect(x - 3, y - 3, 2, 2);
  ctx.fillRect(x + 1, y - 3, 2, 2);
}

function drawBug4(x, y, frame) {
  ctx.fillStyle = '#ff0';
  ctx.beginPath();
  ctx.moveTo(x, y - 12);
  ctx.lineTo(x - 8, y);
  ctx.lineTo(x - 6, y + 12);
  ctx.lineTo(x + 6, y + 12);
  ctx.lineTo(x + 8, y);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#fa0';
  ctx.fillRect(x - 14, y - 6 + Math.sin(frame * 3) * 4, 10, 3);
  ctx.fillRect(x + 4, y - 6 + Math.sin(frame * 3 + 1) * 4, 10, 3);
  ctx.fillStyle = '#f00';
  ctx.fillRect(x - 4, y - 6, 8, 6);
  ctx.fillStyle = '#ff0';
  ctx.fillRect(x - 2, y - 4, 4, 4);
}

function drawExplosion(x, y, frame) {
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2;
    const r = 4 + frame * 2;
    ctx.fillStyle = frame < 3 ? '#ff0' : frame < 6 ? '#f80' : '#f00';
    ctx.fillRect(x + Math.cos(a) * r - 2, y + Math.sin(a) * r - 2, 4, 4);
  }
  ctx.fillStyle = '#fff';
  ctx.fillRect(x - 3 + frame, y - 3 + frame, 6 - frame * 2, 6 - frame * 2);
}

// Game state
const STATE = { MENU: 0, PLAYING: 1, DEAD: 2, GAMEOVER: 3, LEVEL_TRANS: 4 };
let state = STATE.MENU;
let score = 0, highScore = parseInt(localStorage.getItem('galagaHS') || '0');
let lives = 3, level = 1;
let player, bullets, enemyBullets, enemies, explosions, particles;
let enemyDir = 1, enemySpeed = 0.3;
let enemyMoveTimer = 0;
let diveTimer = 0;
let frameCount = 0;
let deathTimer = 0;
let levelTransTimer = 0;
let keys = {};
let lastTime = 0;
let accumulator = 0;
const TICK = 1000 / 60;

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) e.preventDefault();
  if (e.code === 'Enter') {
    if (state === STATE.MENU) startGame();
    else if (state === STATE.GAMEOVER) { state = STATE.MENU; }
  }
  if (e.code === 'Space' && state === STATE.PLAYING && player && player.alive) {
    shoot();
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

function startGame() {
  state = STATE.PLAYING;
  score = 0; lives = 3; level = 1;
  initLevel();
}

function initLevel() {
  player = { x: W / 2, y: H - 50, alive: true, respawnTimer: 0, invincible: 0 };
  bullets = [];
  enemyBullets = [];
  explosions = [];
  particles = [];
  enemyDir = 1;
  enemySpeed = 0.3 + level * 0.1;
  diveTimer = 0;
  enemyMoveTimer = 0;
  createEnemies();
}

function createEnemies() {
  enemies = [];
  const cols = 8, rows = 4;
  const startX = (W - (cols - 1) * 48) / 2;
  const types = [4, 3, 2, 2];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      enemies.push({
        x: startX + c * 48,
        y: 60 + r * 44,
        baseX: startX + c * 48,
        baseY: 60 + r * 44,
        type: types[r],
        alive: true,
        diving: false,
        diveSpeed: 0,
        diveAngle: 0,
        diveTarget: { x: 0, y: 0 },
        divePhase: 0,
        diveReturn: false,
        frame: Math.random() * 100,
        points: [300, 200, 150, 100][r]
      });
    }
  }
}

function shoot() {
  if (!player.alive || bullets.length > 2) return;
  bullets.push({ x: player.x, y: player.y - 16, speed: -8 });
  sfxShoot();
}

function spawnExplosion(x, y) {
  explosions.push({ x, y, frame: 0 });
  sfxExplosion();
  for (let i = 0; i < 12; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 1 + Math.random() * 3;
    particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 20 + Math.random() * 20, color: ['#ff0', '#f80', '#f00', '#fff'][Math.floor(Math.random() * 4)] });
  }
}

function playerDie() {
  player.alive = false;
  spawnExplosion(player.x, player.y);
  sfxPlayerHit();
  lives--;
  deathTimer = 90;
  state = STATE.DEAD;
}

function update() {
  frameCount++;

  // Stars
  for (const s of stars) {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Explosions
  for (let i = explosions.length - 1; i >= 0; i--) {
    explosions[i].frame++;
    if (explosions[i].frame > 12) explosions.splice(i, 1);
  }

  if (state === STATE.DEAD) {
    deathTimer--;
    if (deathTimer <= 0) {
      if (lives <= 0) {
        state = STATE.GAMEOVER;
        if (score > highScore) { localStorage.setItem('galagaHS', score); }
      } else {
        player.alive = true;
        player.x = W / 2;
        player.invincible = 120;
        state = STATE.PLAYING;
      }
    }
    return;
  }

  if (state === STATE.LEVEL_TRANS) {
    levelTransTimer--;
    if (levelTransTimer <= 0) {
      level++;
      initLevel();
    }
    return;
  }

  if (state !== STATE.PLAYING) return;

  // Player movement
  if (player.invincible > 0) player.invincible--;
  if (player.alive) {
    if (keys['ArrowLeft'] || keys['KeyA']) player.x -= 4;
    if (keys['ArrowRight'] || keys['KeyD']) player.x += 4;
    if (keys['ArrowUp'] || keys['KeyW']) player.y -= 3;
    if (keys['ArrowDown'] || keys['KeyS']) player.y += 3;
    player.x = Math.max(16, Math.min(W - 16, player.x));
    player.y = Math.max(H / 2, Math.min(H - 30, player.y));
  }

  // Bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    bullets[i].y += bullets[i].speed;
    if (bullets[i].y < -10 || bullets[i].y > H + 10) bullets.splice(i, 1);
  }

  // Enemy bullets
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx;
    b.y += b.vy;
    if (b.y > H + 10 || b.x < -10 || b.x > W + 10 || b.life > 300) {
      enemyBullets.splice(i, 1);
      continue;
    }
    // Hit player
    if (player.alive && player.invincible <= 0) {
      const dx = b.x - player.x, dy = b.y - player.y;
      if (Math.sqrt(dx * dx + dy * dy) < 14) {
        playerDie();
        enemyBullets.splice(i, 1);
      }
    }
  }

  // Enemy formation movement
  enemyMoveTimer++;
  const formationSpeed = enemySpeed * enemyDir;
  for (const e of enemies) {
    if (!e.alive || e.diving) continue;
    e.x += formationSpeed;
    e.baseX += formationSpeed;
    e.frame += 0.05;
  }

  // Bounce off edges
  let leftEdge = true, rightEdge = true;
  for (const e of enemies) {
    if (!e.alive || e.diving) continue;
    if (e.x < 20) leftEdge = false;
    if (e.x > W - 20) rightEdge = false;
  }
  if (!leftEdge || !rightEdge) {
    enemyDir *= -1;
    for (const e of enemies) {
      if (!e.alive || e.diving) continue;
      e.baseY += 8;
      e.y += 8;
    }
  }

  // Diving enemies
  diveTimer++;
  const diveInterval = Math.max(60, 200 - level * 20);
  if (diveTimer >= diveInterval) {
    diveTimer = 0;
    const aliveEnemies = enemies.filter(e => e.alive && !e.diving);
    if (aliveEnemies.length > 0) {
      const diver = aliveEnemies[Math.floor(Math.random() * aliveEnemies.length)];
      diver.diving = true;
      diver.divePhase = 0;
      diver.diveSpeed = 2 + level * 0.3;
      diver.diveAngle = Math.atan2(player.y - diver.y, player.x - diver.x);
      sfxDive();
    }
  }

  // Update diving enemies
  for (const e of enemies) {
    if (!e.alive || !e.diving) continue;
    e.frame += 0.15;

    if (e.divePhase === 0) {
      // Dive toward player area
      e.x += Math.cos(e.diveAngle) * e.diveSpeed;
      e.y += Math.sin(e.diveAngle) * e.diveSpeed;
      if (e.y > H + 40) {
        e.diving = false;
        e.diveReturn = true;
        e.divePhase = 1;
      }
      // Shoot while diving
      if (frameCount % Math.max(20, 50 - level * 5) === 0) {
        const angle = Math.atan2(player.y - e.y, player.x - e.x);
        enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(angle) * 3, vy: Math.sin(angle) * 3, life: 0 });
      }
    } else if (e.divePhase === 1) {
      // Return to formation
      const dx = e.baseX - e.x;
      const dy = e.baseY - e.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 5) {
        e.x = e.baseX;
        e.y = e.baseY;
        e.diving = false;
        e.diveReturn = false;
      } else {
        e.x += (dx / dist) * 3;
        e.y += (dy / dist) * 3;
      }
    }
  }

  // Bullet-enemy collision
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    for (const e of enemies) {
      if (!e.alive) continue;
      const dx = b.x - e.x, dy = b.y - e.y;
      if (Math.sqrt(dx * dx + dy * dy) < 14) {
        e.alive = false;
        score += e.points;
        spawnExplosion(e.x, e.y);
        bullets.splice(i, 1);
        break;
      }
    }
  }

  // Check level clear
  if (enemies.every(e => !e.alive)) {
    state = STATE.LEVEL_TRANS;
    levelTransTimer = 120;
    sfxLevelUp();
  }
}

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (const s of stars) {
    ctx.fillStyle = `rgba(255,255,255,${0.3 + s.speed * 0.3})`;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }

  if (state === STATE.MENU) {
    drawMenu();
    return;
  }

  if (state === STATE.GAMEOVER) {
    drawGameElements();
    drawGameOver();
    return;
  }

  drawGameElements();

  if (state === STATE.LEVEL_TRANS) {
    ctx.fillStyle = '#ff0';
    ctx.font = 'bold 36px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(`STAGE ${level}`, W / 2, H / 2);
    ctx.font = '16px Courier New';
    ctx.fillStyle = '#fff';
    ctx.fillText('GET READY!', W / 2, H / 2 + 40);
  }

  drawHUD();
}

function drawGameElements() {
  // Bullets
  ctx.fillStyle = '#fff';
  for (const b of bullets) {
    ctx.fillRect(b.x - 1.5, b.y - 6, 3, 12);
    ctx.fillStyle = '#ff0';
    ctx.fillRect(b.x - 1, b.y - 4, 2, 8);
    ctx.fillStyle = '#fff';
  }

  // Enemy bullets
  for (const b of enemyBullets) {
    ctx.fillStyle = '#f44';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#faa';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Enemies
  for (const e of enemies) {
    if (!e.alive) continue;
    e.frame += 0;
    if (e.type === 2) drawBug1(e.x, e.y, e.frame);
    else if (e.type === 3) drawBug2(e.x, e.y, e.frame);
    else if (e.type === 4) drawBug3(e.x, e.y, e.frame);
    else if (e.type === 1) drawBug4(e.x, e.y, e.frame);
  }

  // Player
  if (player && player.alive && (player.invincible <= 0 || frameCount % 4 < 2)) {
    drawPlayer(player.x, player.y);
  }

  // Explosions
  for (const ex of explosions) {
    drawExplosion(ex.x, ex.y, ex.frame);
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life / 40;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
  }
  ctx.globalAlpha = 1;
}

function drawHUD() {
  ctx.fillStyle = '#fff';
  ctx.font = '14px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText(`SCORE`, 10, 20);
  ctx.fillStyle = '#ff0';
  ctx.font = 'bold 16px Courier New';
  ctx.fillText(String(score).padStart(8, '0'), 10, 38);

  ctx.fillStyle = '#fff';
  ctx.font = '14px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(`STAGE ${level}`, W / 2, 20);

  ctx.textAlign = 'right';
  ctx.fillStyle = '#fff';
  ctx.font = '14px Courier New';
  ctx.fillText(`HIGH SCORE`, W - 10, 20);
  ctx.fillStyle = '#f88';
  ctx.font = 'bold 14px Courier New';
  ctx.fillText(String(highScore).padStart(8, '0'), W - 10, 38);

  // Lives
  ctx.textAlign = 'left';
  for (let i = 0; i < lives; i++) {
    drawPlayer(20 + i * 22, H - 12);
  }
}

function drawMenu() {
  // Title
  ctx.fillStyle = '#f00';
  ctx.font = 'bold 48px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('GALAGA', W / 2, H / 3);

  ctx.fillStyle = '#ff0';
  ctx.font = '14px Courier New';
  ctx.fillText('--- ARCADE CLASSIC ---', W / 2, H / 3 + 30);

  // Draw sample enemies
  drawBug1(W / 2 - 80, H / 2, frameCount);
  drawBug2(W / 2, H / 2, frameCount);
  drawBug4(W / 2 + 80, H / 2, frameCount);

  ctx.fillStyle = '#fff';
  ctx.font = '14px Courier New';
  ctx.fillText('ARROWS / WASD - Move', W / 2, H / 2 + 60);
  ctx.fillText('SPACE - Shoot', W / 2, H / 2 + 80);

  if (frameCount % 60 < 40) {
    ctx.fillStyle = '#ff0';
    ctx.font = 'bold 20px Courier New';
    ctx.fillText('PRESS ENTER TO START', W / 2, H - 80);
  }

  if (highScore > 0) {
    ctx.fillStyle = '#888';
    ctx.font = '14px Courier New';
    ctx.fillText(`HIGH SCORE: ${String(highScore).padStart(8, '0')}`, W / 2, H - 40);
  }
}

function drawGameOver() {
  ctx.fillStyle = '#f00';
  ctx.font = 'bold 40px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W / 2, H / 2 - 40);

  ctx.fillStyle = '#fff';
  ctx.font = '20px Courier New';
  ctx.fillText(`FINAL SCORE: ${score}`, W / 2, H / 2 + 10);

  if (score >= highScore && score > 0) {
    ctx.fillStyle = '#ff0';
    ctx.font = 'bold 18px Courier New';
    ctx.fillText('NEW HIGH SCORE!', W / 2, H / 2 + 40);
  }

  if (frameCount % 60 < 40) {
    ctx.fillStyle = '#888';
    ctx.font = '16px Courier New';
    ctx.fillText('PRESS ENTER TO CONTINUE', W / 2, H / 2 + 80);
  }
}

function gameLoop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const delta = timestamp - lastTime;
  lastTime = timestamp;
  accumulator += delta;

  while (accumulator >= TICK) {
    update();
    accumulator -= TICK;
  }

  draw();
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
